name: Deploy to GitHub Pages

on:
  # 當有檔案推送到 main 分支時觸發
  push:
    branches: ["main"]
  # 允許手動觸發
  workflow_dispatch:

# 設定 GitHub Token 的權限，允許部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允許一個並行的部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 此處指向 Vite 編譯出來的 dist 目錄
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
